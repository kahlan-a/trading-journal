<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Trading Journal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --accent-gold: #ffd700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; }
        .logo span { color: var(--profit-green); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .role-badge { background: var(--card-bg); padding: 5px 10px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border-color); }
        .role-badge.owner { color: var(--accent-gold); border-color: var(--accent-gold); }
        .btn-logout { background: transparent; border: 1px solid var(--loss-red); color: var(--loss-red); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .dashboard { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { text-align: center; color: var(--text-muted); font-size: 14px; font-weight: bold; }
        .day-cell { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; min-height: 80px; cursor: pointer; transition: 0.2s; position: relative; }
        .day-cell:hover { border-color: var(--profit-green); }
        .day-num { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .trade-indicator { position: absolute; bottom: 5px; left: 5px; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .win-ind { background: rgba(0, 255, 136, 0.2); color: var(--profit-green); }
        .loss-ind { background: rgba(255, 68, 68, 0.2); color: var(--loss-red); }
        .empty-cell { background: transparent; border: none; cursor: default; }

        .sidebar .card-title { justify-content: center; }
        .calc-input { width: 100%; padding: 10px; margin-bottom: 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; color: #fff; }
        .calc-result { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--profit-green); color: var(--profit-green); padding: 15px; text-align: center; border-radius: 6px; font-size: 18px; font-weight: bold; margin-top: 10px; }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .stat-bar-container { width: 100%; height: 10px; background: var(--bg-color); border-radius: 5px; overflow: hidden; margin-top: 5px; margin-bottom: 20px; display: flex; }
        .stat-bar-win { height: 100%; background: var(--profit-green); transition: width 0.3s; }
        .stat-bar-loss { height: 100%; background: var(--loss-red); transition: width 0.3s; }
        .owner-only { display: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; color: #fff; }
        .radio-group { display: flex; gap: 15px; }
        .btn-submit { width: 100%; padding: 12px; background: var(--profit-green); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-loss { background: var(--loss-red); color: #fff; margin-left: 10px; }
        .close-modal { float: left; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .calendar-grid { gap: 5px; }
            .day-cell { min-height: 55px; padding: 6px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🐂 Trading <span>Journal</span> 🐻</div>
        <div class="user-info">
            <button class="owner-only" style="background:var(--accent-gold); color:#000; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">+ إضافة مستخدم</button>
            <div class="role-badge owner" id="roleBadge">Owner</div>
            <button class="btn-logout">تسجيل خروج</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="main-content">
            <div class="card">
                <div class="card-title">📅 تقويم الصفقات — <span id="currentMonth"></span></div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="card">
                <div class="card-title">📊 الإحصائيات الشهرية</div>
                <div class="stat-row">
                    <span>إجمالي الصفقات:</span>
                    <span id="totalTrades">0</span>
                </div>
                <div class="stat-row">
                    <span style="color:var(--profit-green)">نسبة النجاح (Win Rate):</span>
                    <span id="winRate">—</span>
                </div>
                <div class="stat-bar-container">
                    <div class="stat-bar-win" id="winBar" style="width:50%"></div>
                    <div class="stat-bar-loss" id="lossBar" style="width:50%"></div>
                </div>
                <div class="stat-row">
                    <span>صافي الربح/الخسارة:</span>
                    <span id="netPnl" style="color:var(--profit-green)">$0</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="card-title">💰 حاسبة حجم اللوت</div>
                <input type="number" class="calc-input" id="capital" placeholder="رأس المال ($)">
                <input type="number" class="calc-input" id="riskPerc" placeholder="نسبة المخاطرة %">
                <input type="number" class="calc-input" id="slPips" placeholder="وقف الخسارة (بونكت)">
                <div class="calc-result" id="lotResult">حجم اللوت: 0.00</div>
                <p style="font-size:11px; color:var(--text-muted); margin-top:10px;">* (رأس المال × %) / (SL × 10)</p>
            </div>

            <div class="card">
                <div class="card-title">🏆 ملخص الأسبوع</div>
                <div class="stat-row">
                    <span>صفقات ناجحة:</span>
                    <span id="weekWins" style="color:var(--profit-green)">0</span>
                </div>
                <div class="stat-row">
                    <span>صفقات خاسرة:</span>
                    <span id="weekLosses" style="color:var(--loss-red)">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="tradeModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <h3 style="margin-bottom:20px;">تسجيل صفقة يوم <span id="modalDayNum"></span></h3>

            <div class="form-group">
                <label>زوج العملات</label>
                <select class="form-control" id="pair">
                    <option>EUR/USD</option>
                    <option>GBP/USD</option>
                    <option>USD/JPY</option>
                    <option>XAU/USD (ذهب)</option>
                </select>
            </div>

            <div class="form-group">
                <label>نوع الصفقة</label>
                <div class="radio-group">
                    <label><input type="radio" name="type" value="buy" checked> شراء (Buy) 📈</label>
                    <label><input type="radio" name="type" value="sell"> بيع (Sell) 📉</label>
                </div>
            </div>

            <div class="form-group">
                <label>النتيجة والمبلغ</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" class="form-control" id="tradeAmount" placeholder="المبلغ ($)">
                    <button class="btn-submit" style="width:auto; padding:10px 20px;" onclick="submitTrade('win')">نجاح ✓</button>
                    <button class="btn-submit btn-loss" style="width:auto; padding:10px 20px;" onclick="submitTrade('loss')">خسارة ✗</button>
                </div>
            </div>

            <div class="form-group">
                <label>نسبة من الحساب %</label>
                <input type="number" class="form-control" id="tradePerc" placeholder="مثال: 2">
            </div>

            <div class="form-group">
                <label>ماذا تعلمت اليوم؟ 📝</label>
                <textarea class="form-control" id="tradeLesson" rows="3" placeholder="صبرت على الصفقة، أو خرجت مبكراً..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let currentUserRole = 'owner';
        if (currentUserRole === 'owner') {
            document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
        }

        let trades = JSON.parse(localStorage.getItem('trades') || '[]');
        let selectedDay = null;

        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        const daysOfWeek = ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

        function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const now = new Date();
            document.getElementById('currentMonth').textContent = months[now.getMonth()] + ' ' + now.getFullYear();

            daysOfWeek.forEach(day => {
                let h = document.createElement('div');
                h.className = 'day-header';
                h.innerText = day;
                grid.appendChild(h);
            });

            const month = now.getMonth();
            const year = now.getFullYear();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            for (let i = 0; i < firstDay; i++) {
                let empty = document.createElement('div');
                empty.className = 'day-cell empty-cell';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                let cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.onclick = () => openModal(day);

                let num = document.createElement('div');
                num.className = 'day-num';
                num.innerText = day;
                cell.appendChild(num);

                let trade = trades.find(t => t.day === day);
                if (trade) {
                    let ind = document.createElement('div');
                    ind.className = 'trade-indicator ' + (trade.result === 'win' ? 'win-ind' : 'loss-ind');
                    ind.innerText = trade.result === 'win' ? '✓ ربح' : '✗ خسارة';
                    cell.appendChild(ind);
                }

                grid.appendChild(cell);
            }
        }

        function openModal(day) {
            selectedDay = day;
            document.getElementById('modalDayNum').innerText = day;
            document.getElementById('tradeModal').style.display = 'flex';
            document.getElementById('tradeAmount').value = '';
            document.getElementById('tradePerc').value = '';
            document.getElementById('tradeLesson').value = '';
            let existing = trades.find(t => t.day === day);
            if (existing) {
                document.getElementById('tradeAmount').value = existing.amount;
                document.getElementById('tradeLesson').value = existing.lesson || '';
            }
        }

        function closeModal() {
            document.getElementById('tradeModal').style.display = 'none';
        }

        function submitTrade(result) {
            let amount = document.getElementById('tradeAmount').value;
            if (!amount) { alert('يرجى إدخال المبلغ'); return; }

            let idx = trades.findIndex(t => t.day === selectedDay);
            let entry = {
                day: selectedDay,
                pair: document.getElementById('pair').value,
                type: document.querySelector('input[name="type"]:checked').value,
                result: result,
                amount: parseFloat(amount),
                percentage: parseFloat(document.getElementById('tradePerc').value) || 0,
                lesson: document.getElementById('tradeLesson').value
            };

            if (idx >= 0) trades[idx] = entry;
            else trades.push(entry);

            localStorage.setItem('trades', JSON.stringify(trades));
            closeModal();
            generateCalendar();
            updateStats();
        }

        function updateStats() {
            let wins = trades.filter(t => t.result === 'win').length;
            let losses = trades.filter(t => t.result === 'loss').length;
            let total = trades.length;
            let winPerc = total === 0 ? 50 : Math.round((wins / total) * 100);

            document.getElementById('totalTrades').innerText = total;
            document.getElementById('winRate').innerText = total === 0 ? '—' : winPerc + '%';
            document.getElementById('winBar').style.width = winPerc + '%';
            document.getElementById('lossBar').style.width = (100 - winPerc) + '%';

            let netPnl = trades.reduce((sum, t) => t.result === 'win' ? sum + t.amount : sum - t.amount, 0);
            let pnlEl = document.getElementById('netPnl');
            pnlEl.innerText = (netPnl >= 0 ? '+$' : '-$') + Math.abs(netPnl).toFixed(2);
            pnlEl.style.color = netPnl >= 0 ? 'var(--profit-green)' : 'var(--loss-red)';

            let recent = trades.slice(-7);
            document.getElementById('weekWins').innerText = recent.filter(t => t.result === 'win').length;
            document.getElementById('weekLosses').innerText = recent.filter(t => t.result === 'loss').length;
        }

        document.querySelectorAll('.calc-input').forEach(input => {
            input.addEventListener('input', calculateLot);
        });

        function calculateLot() {
            let capital = parseFloat(document.getElementById('capital').value);
            let risk = parseFloat(document.getElementById('riskPerc').value);
            let sl = parseFloat(document.getElementById('slPips').value);
            if (capital > 0 && risk > 0 && sl > 0) {
                let lotSize = (capital * risk / 100) / (sl * 10);
                document.getElementById('lotResult').innerText = 'حجم اللوت: ' + lotSize.toFixed(2);
            } else {
                document.getElementById('lotResult').innerText = 'حجم اللوت: 0.00';
            }
        }

        generateCalendar();
        updateStats();
    </script>
</body>
</html>
